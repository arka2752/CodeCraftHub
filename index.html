<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeCraftHub — Course Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg-base:      #0a0c14;
        --bg-surface:   #10131f;
        --bg-card:      rgba(255,255,255,0.045);
        --bg-card-hover:rgba(255,255,255,0.075);
        --border:       rgba(255,255,255,0.08);
        --border-focus: rgba(99,179,237,0.6);

        --accent:       #3b82f6;
        --accent-glow:  rgba(59,130,246,0.35);
        --accent2:      #06b6d4;
        --success:      #10b981;
        --warning:      #f59e0b;
        --danger:       #ef4444;
        --danger-glow:  rgba(239,68,68,0.3);

        --text-primary: #f1f5f9;
        --text-secondary:#94a3b8;
        --text-muted:   #475569;

        --radius-sm:    6px;
        --radius-md:    12px;
        --radius-lg:    18px;
        --radius-xl:    24px;

        --shadow-card:  0 4px 24px rgba(0,0,0,0.45);
        --shadow-modal: 0 24px 64px rgba(0,0,0,0.7);

        --transition:   all 0.22s cubic-bezier(0.4,0,0.2,1);
      }

      html { scroll-behavior: smooth; }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--bg-base);
        color: var(--text-primary);
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* ── Background orbs ── */
      body::before, body::after {
        content: '';
        position: fixed;
        border-radius: 50%;
        filter: blur(120px);
        pointer-events: none;
        z-index: 0;
      }
      body::before {
        width: 600px; height: 600px;
        top: -200px; left: -150px;
        background: radial-gradient(circle, rgba(59,130,246,0.12) 0%, transparent 70%);
      }
      body::after {
        width: 500px; height: 500px;
        bottom: -150px; right: -100px;
        background: radial-gradient(circle, rgba(6,182,212,0.1) 0%, transparent 70%);
      }

      /* ── Layout ── */
      .app { position: relative; z-index: 1; }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 40px;
        height: 68px;
        background: rgba(10,12,20,0.8);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.2rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        color: var(--text-primary);
        text-decoration: none;
      }
      .logo-icon {
        width: 34px; height: 34px;
        border-radius: var(--radius-sm);
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        display: grid; place-items: center;
        font-size: 1rem;
        box-shadow: 0 0 16px var(--accent-glow);
      }
      .logo-tag {
        font-size: 0.65rem;
        font-weight: 500;
        color: var(--accent);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        background: rgba(59,130,246,0.12);
        padding: 2px 7px;
        border-radius: 20px;
        border: 1px solid rgba(59,130,246,0.25);
      }

      .header-actions { display: flex; align-items: center; gap: 12px; }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 20px;
        border-radius: var(--radius-sm);
        font-family: 'Inter', sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        border: none;
        transition: var(--transition);
        white-space: nowrap;
        text-decoration: none;
      }
      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        box-shadow: 0 0 0 0 var(--accent-glow);
      }
      .btn-primary:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 20px var(--accent-glow);
      }
      .btn-primary:active { transform: translateY(0); }

      .btn-ghost {
        background: transparent;
        color: var(--text-secondary);
        border: 1px solid var(--border);
      }
      .btn-ghost:hover {
        background: var(--bg-card-hover);
        color: var(--text-primary);
        border-color: rgba(255,255,255,0.15);
      }

      .btn-danger {
        background: rgba(239,68,68,0.12);
        color: var(--danger);
        border: 1px solid rgba(239,68,68,0.2);
      }
      .btn-danger:hover {
        background: rgba(239,68,68,0.22);
        box-shadow: 0 0 16px var(--danger-glow);
      }

      .btn-success {
        background: rgba(16,185,129,0.14);
        color: var(--success);
        border: 1px solid rgba(16,185,129,0.25);
      }
      .btn-success:hover { background: rgba(16,185,129,0.24); }

      .btn-sm { padding: 6px 13px; font-size: 0.8rem; }
      .btn-icon { padding: 8px; gap: 0; }

      /* ── Main ── */
      main { padding: 40px; max-width: 1400px; margin: 0 auto; }

      /* ── Page header strip ── */
      .page-top {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 32px;
        flex-wrap: wrap;
      }
      .page-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.75rem;
        font-weight: 700;
        letter-spacing: -0.03em;
        background: linear-gradient(135deg, var(--text-primary) 40%, var(--accent2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .page-sub {
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-top: 4px;
      }

      /* ── Stats strip ── */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 16px;
        margin-bottom: 32px;
      }
      .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 20px 24px;
        backdrop-filter: blur(14px);
        transition: var(--transition);
      }
      .stat-card:hover { border-color: rgba(255,255,255,0.14); background: var(--bg-card-hover); }
      .stat-label {
        font-size: 0.75rem;
        font-weight: 500;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 8px;
      }
      .stat-value {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.04em;
        color: var(--text-primary);
      }
      .stat-value.accent { color: var(--accent); }
      .stat-value.success { color: var(--success); }
      .stat-value.cyan { color: var(--accent2); }

      /* ── Search / filter bar ── */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
        flex-wrap: wrap;
      }
      .search-wrap {
        position: relative;
        flex: 1;
        min-width: 220px;
      }
      .search-icon {
        position: absolute;
        left: 13px; top: 50%;
        transform: translateY(-50%);
        color: var(--text-muted);
        pointer-events: none;
        font-size: 0.9rem;
      }
      .search-input {
        width: 100%;
        padding: 10px 16px 10px 38px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text-primary);
        font-size: 0.875rem;
        font-family: 'Inter', sans-serif;
        outline: none;
        transition: var(--transition);
        backdrop-filter: blur(10px);
      }
      .search-input::placeholder { color: var(--text-muted); }
      .search-input:focus {
        border-color: var(--border-focus);
        background: rgba(255,255,255,0.06);
        box-shadow: 0 0 0 3px rgba(99,179,237,0.1);
      }

      /* ── Grid ── */
      #courses-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
      }

      /* ── Course card ── */
      .course-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        backdrop-filter: blur(14px);
        transition: var(--transition);
        display: flex;
        flex-direction: column;
        gap: 12px;
        animation: fadeUp 0.35s ease both;
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .course-card:hover {
        border-color: rgba(59,130,246,0.3);
        background: var(--bg-card-hover);
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.35);
      }

      .card-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }
      .card-badge {
        width: 42px; height: 42px;
        border-radius: var(--radius-sm);
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        display: grid; place-items: center;
        font-size: 1.1rem;
        flex-shrink: 0;
        box-shadow: 0 4px 12px var(--accent-glow);
      }
      .card-actions { display: flex; gap: 6px; }

      .card-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: -0.02em;
        color: var(--text-primary);
        line-height: 1.35;
      }
      .card-instructor {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.8rem;
        color: var(--accent2);
        font-weight: 500;
      }
      .card-instructor svg { opacity: 0.7; }

      .card-description {
        font-size: 0.85rem;
        color: var(--text-secondary);
        line-height: 1.6;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: auto;
        padding-top: 12px;
        border-top: 1px solid var(--border);
      }
      .card-duration {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.78rem;
        color: var(--text-muted);
      }

      /* ── Empty / loading / error states ── */
      .state-panel {
        grid-column: 1 / -1;
        text-align: center;
        padding: 64px 24px;
        color: var(--text-muted);
      }
      .state-panel .icon { font-size: 3rem; margin-bottom: 16px; display: block; }
      .state-panel p { font-size: 0.95rem; }
      .state-panel .hint { font-size: 0.8rem; margin-top: 6px; }

      .error-banner {
        display: none;
        align-items: center;
        gap: 12px;
        background: rgba(239,68,68,0.1);
        border: 1px solid rgba(239,68,68,0.25);
        border-radius: var(--radius-md);
        padding: 14px 20px;
        margin-bottom: 24px;
        font-size: 0.875rem;
        color: #fca5a5;
        animation: fadeUp 0.3s ease;
      }
      .error-banner.visible { display: flex; }
      .error-close {
        margin-left: auto;
        background: none;
        border: none;
        color: #fca5a5;
        cursor: pointer;
        font-size: 1.1rem;
        padding: 2px 6px;
        border-radius: 4px;
        transition: var(--transition);
      }
      .error-close:hover { background: rgba(255,255,255,0.08); }

      /* ── Skeleton loader ── */
      .skeleton {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .skel-line {
        height: 12px;
        border-radius: 6px;
        background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
      }
      .skel-line.w-60  { width: 60%; }
      .skel-line.w-40  { width: 40%; }
      .skel-line.w-80  { width: 80%; }
      .skel-line.h-42  { height: 42px; width: 42px; border-radius: var(--radius-sm); }
      @keyframes shimmer {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      /* ── Modal overlay ── */
      .modal-overlay {
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(6px);
        z-index: 200;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }
      .modal-overlay.open {
        opacity: 1;
        pointer-events: all;
      }

      .modal {
        background: #131726;
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: var(--radius-xl);
        padding: 36px 40px;
        width: 100%;
        max-width: 520px;
        box-shadow: var(--shadow-modal);
        transform: scale(0.96) translateY(10px);
        transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
        position: relative;
      }
      .modal-overlay.open .modal {
        transform: scale(1) translateY(0);
      }

      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 28px;
      }
      .modal-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      .modal-close {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text-secondary);
        cursor: pointer;
        width: 32px; height: 32px;
        display: grid; place-items: center;
        font-size: 1rem;
        transition: var(--transition);
      }
      .modal-close:hover { background: var(--bg-card-hover); color: var(--text-primary); }

      /* ── Form ── */
      .form-grid { display: flex; flex-direction: column; gap: 18px; }
      .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

      .field { display: flex; flex-direction: column; gap: 6px; }
      .field label {
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--text-secondary);
        text-transform: uppercase;
        letter-spacing: 0.07em;
      }
      .field label .required { color: var(--accent); margin-left: 2px; }

      .field input, .field textarea {
        background: rgba(255,255,255,0.04);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 11px 14px;
        color: var(--text-primary);
        font-size: 0.875rem;
        font-family: 'Inter', sans-serif;
        outline: none;
        transition: var(--transition);
        resize: vertical;
      }
      .field input::placeholder, .field textarea::placeholder { color: var(--text-muted); }
      .field input:focus, .field textarea:focus {
        border-color: var(--border-focus);
        background: rgba(99,179,237,0.05);
        box-shadow: 0 0 0 3px rgba(99,179,237,0.1);
      }
      .field .error-msg {
        font-size: 0.75rem;
        color: var(--danger);
        display: none;
      }
      .field.invalid input, .field.invalid textarea {
        border-color: var(--danger);
        box-shadow: 0 0 0 3px var(--danger-glow);
      }
      .field.invalid .error-msg { display: block; }

      .form-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 8px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
      }

      /* ── Confirm delete modal ── */
      .confirm-icon {
        width: 56px; height: 56px;
        border-radius: 50%;
        background: rgba(239,68,68,0.12);
        border: 1px solid rgba(239,68,68,0.25);
        display: grid; place-items: center;
        font-size: 1.5rem;
        margin: 0 auto 20px;
      }
      .confirm-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.15rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 8px;
      }
      .confirm-sub {
        font-size: 0.85rem;
        color: var(--text-secondary);
        text-align: center;
        line-height: 1.6;
        margin-bottom: 28px;
      }
      .confirm-sub strong { color: var(--text-primary); }

      /* ── Toast ── */
      #toast-container {
        position: fixed;
        bottom: 28px; right: 28px;
        z-index: 999;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
      }
      .toast {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 13px 18px;
        border-radius: var(--radius-md);
        font-size: 0.85rem;
        font-weight: 500;
        backdrop-filter: blur(14px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.4);
        animation: toastIn 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
        pointer-events: all;
        border: 1px solid transparent;
        max-width: 340px;
      }
      @keyframes toastIn {
        from { opacity: 0; transform: translateY(16px) scale(0.94); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
      }
      .toast.fade-out {
        animation: toastOut 0.25s ease both;
      }
      @keyframes toastOut {
        to { opacity: 0; transform: translateY(8px); }
      }
      .toast.success {
        background: rgba(16,185,129,0.15);
        border-color: rgba(16,185,129,0.3);
        color: #6ee7b7;
      }
      .toast.error {
        background: rgba(239,68,68,0.15);
        border-color: rgba(239,68,68,0.3);
        color: #fca5a5;
      }
      .toast.info {
        background: rgba(59,130,246,0.15);
        border-color: rgba(59,130,246,0.3);
        color: #93c5fd;
      }

      /* ── Responsive ── */
      @media (max-width: 768px) {
        header { padding: 0 20px; }
        main { padding: 24px 20px; }
        .form-row { grid-template-columns: 1fr; }
        .modal { padding: 28px 24px; }
        #courses-grid { grid-template-columns: 1fr; }
      }
      @media (max-width: 480px) {
        .page-top { flex-direction: column; align-items: flex-start; }
        .logo-tag { display: none; }
      }
    </style>
  </head>
  <body>
    <div class="app">

      <!-- ── Header ── -->
      <header>
        <a href="#" class="logo">
          <div class="logo-icon">&#9670;</div>
          <span>CodeCraftHub</span>
          <span class="logo-tag">Admin</span>
        </a>
        <div class="header-actions">
          <button class="btn btn-primary" id="btn-add-course">
            <svg width="14" height="14" fill="none" viewBox="0 0 16 16"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            New Course
          </button>
        </div>
      </header>

      <!-- ── Main ── -->
      <main>

        <!-- Page top -->
        <div class="page-top">
          <div>
            <h1 class="page-title">Course Catalog</h1>
            <p class="page-sub">Manage all developer learning tracks</p>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-label">Total Courses</div>
            <div class="stat-value accent" id="stat-total">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Instructors</div>
            <div class="stat-value cyan" id="stat-instructors">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Avg Duration</div>
            <div class="stat-value success" id="stat-duration">—</div>
          </div>
        </div>

        <!-- Error banner -->
        <div class="error-banner" id="error-banner">
          <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span id="error-message">Could not connect to the API.</span>
          <button class="error-close" id="error-close">&#x2715;</button>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
          <div class="search-wrap">
            <span class="search-icon">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2"/><path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </span>
            <input type="search" class="search-input" id="search-input" placeholder="Search by title, instructor…" />
          </div>
          <button class="btn btn-ghost" id="btn-refresh" title="Refresh">
            <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Refresh
          </button>
        </div>

        <!-- Courses grid -->
        <div id="courses-grid"></div>

      </main>
    </div>

    <!-- ── Course form modal ── -->
    <div class="modal-overlay" id="form-modal">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="form-modal-title">
        <div class="modal-header">
          <h2 class="modal-title" id="form-modal-title">Add New Course</h2>
          <button class="modal-close" id="form-modal-close" aria-label="Close">&#x2715;</button>
        </div>
        <form id="course-form" novalidate>
          <div class="form-grid">
            <div class="form-row">
              <div class="field" id="field-title">
                <label>Title <span class="required">*</span></label>
                <input type="text" id="input-title" placeholder="e.g. Mastering TypeScript" />
                <span class="error-msg">Title is required.</span>
              </div>
              <div class="field" id="field-instructor">
                <label>Instructor <span class="required">*</span></label>
                <input type="text" id="input-instructor" placeholder="e.g. Jane Doe" />
                <span class="error-msg">Instructor is required.</span>
              </div>
            </div>
            <div class="field">
              <label>Description</label>
              <textarea id="input-description" rows="3" placeholder="Brief overview of what students will learn…"></textarea>
            </div>
            <div class="field">
              <label>Duration</label>
              <input type="text" id="input-duration" placeholder="e.g. 12 hours, 6 weeks" />
            </div>
          </div>
          <div class="form-footer">
            <button type="button" class="btn btn-ghost" id="form-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary" id="form-submit">
              <svg width="13" height="13" fill="none" viewBox="0 0 16 16"><path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
              <span id="form-submit-label">Add Course</span>
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- ── Confirm delete modal ── -->
    <div class="modal-overlay" id="delete-modal">
      <div class="modal" style="max-width:420px" role="dialog" aria-modal="true">
        <div class="confirm-icon">&#x26A0;</div>
        <div class="confirm-title">Delete Course?</div>
        <div class="confirm-sub">This will permanently remove <strong id="delete-course-name">"Course Title"</strong> and cannot be undone.</div>
        <div class="form-footer" style="justify-content:center; padding-top:0; border:none;">
          <button class="btn btn-ghost" id="delete-cancel">Cancel</button>
          <button class="btn btn-danger" id="delete-confirm">Delete Course</button>
        </div>
      </div>
    </div>

    <!-- ── Toast container ── -->
    <div id="toast-container"></div>

    <script>
      const API = 'http://127.0.0.1:5000/api/courses';

      // ── State ──────────────────────────────────────────────────────────────
      let courses = [];
      let editingId = null;
      let pendingDeleteId = null;

      // ── DOM refs ───────────────────────────────────────────────────────────
      const grid          = document.getElementById('courses-grid');
      const searchInput   = document.getElementById('search-input');
      const errorBanner   = document.getElementById('error-banner');
      const errorMessage  = document.getElementById('error-message');
      const errorClose    = document.getElementById('error-close');
      const formModal     = document.getElementById('form-modal');
      const deleteModal   = document.getElementById('delete-modal');
      const courseForm    = document.getElementById('course-form');
      const formTitle     = document.getElementById('form-modal-title');
      const formSubmitLbl = document.getElementById('form-submit-label');
      const inputTitle    = document.getElementById('input-title');
      const inputInstr    = document.getElementById('input-instructor');
      const inputDesc     = document.getElementById('input-description');
      const inputDur      = document.getElementById('input-duration');
      const statTotal     = document.getElementById('stat-total');
      const statInstr     = document.getElementById('stat-instructors');
      const statDur       = document.getElementById('stat-duration');
      const deleteCourseName = document.getElementById('delete-course-name');

      // ── Toast ──────────────────────────────────────────────────────────────
      function toast(msg, type = 'info') {
        const el = document.createElement('div');
        el.className = \`toast \${type}\`;
        const icons = { success: '&#10003;', error: '&#9888;', info: '&#8505;' };
        el.innerHTML = \`<span>\${icons[type]}</span><span>\${msg}</span>\`;
        document.getElementById('toast-container').appendChild(el);
        setTimeout(() => {
          el.classList.add('fade-out');
          el.addEventListener('animationend', () => el.remove());
        }, 3200);
      }

      // ── Error banner ───────────────────────────────────────────────────────
      function showError(msg) {
        errorMessage.textContent = msg;
        errorBanner.classList.add('visible');
      }
      function hideError() { errorBanner.classList.remove('visible'); }
      errorClose.addEventListener('click', hideError);

      // ── Modal helpers ──────────────────────────────────────────────────────
      function openModal(el) {
        el.classList.add('open');
        document.body.style.overflow = 'hidden';
      }
      function closeModal(el) {
        el.classList.remove('open');
        document.body.style.overflow = '';
      }
      [formModal, deleteModal].forEach(m => {
        m.addEventListener('click', e => { if (e.target === m) closeModal(m); });
      });
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') { closeModal(formModal); closeModal(deleteModal); }
      });

      // ── Stats ──────────────────────────────────────────────────────────────
      function updateStats() {
        statTotal.textContent = courses.length;
        const uniqueInstructors = new Set(courses.map(c => c.instructor).filter(Boolean)).size;
        statInstr.textContent = uniqueInstructors || '—';

        const durationNumbers = courses
          .map(c => c.duration ? parseFloat(c.duration) : null)
          .filter(n => n !== null && !isNaN(n));
        if (durationNumbers.length) {
          const avg = durationNumbers.reduce((a, b) => a + b, 0) / durationNumbers.length;
          statDur.textContent = avg % 1 === 0 ? avg : avg.toFixed(1);
        } else {
          statDur.textContent = courses.length ? '—' : '0';
        }
      }

      // ── Skeleton ───────────────────────────────────────────────────────────
      function showSkeletons(n = 6) {
        grid.innerHTML = Array.from({ length: n }, () => \`
          <div class="skeleton">
            <div style="display:flex;gap:12px;align-items:flex-start">
              <div class="skel-line h-42"></div>
              <div style="flex:1;display:flex;flex-direction:column;gap:8px">
                <div class="skel-line w-60"></div>
                <div class="skel-line w-40"></div>
              </div>
            </div>
            <div class="skel-line w-80"></div>
            <div class="skel-line w-60"></div>
          </div>
        \`).join('');
      }

      // ── Render grid ────────────────────────────────────────────────────────
      const EMOJIS = ['&#128218;','&#128187;','&#9881;','&#128161;','&#127775;','&#128640;','&#128295;','&#9729;'];

      function renderCourses(list) {
        if (!list.length) {
          grid.innerHTML = \`<div class="state-panel">
            <span class="icon">&#128218;</span>
            <p>No courses found.</p>
            <p class="hint">Add your first course using the button above.</p>
          </div>\`;
          return;
        }
        grid.innerHTML = list.map((c, i) => {
          const emoji = EMOJIS[i % EMOJIS.length];
          const desc = c.description || '<em style="color:var(--text-muted)">No description provided.</em>';
          const dur  = c.duration  || '—';
          return \`
            <div class="course-card" data-id="\${c.id}">
              <div class="card-header">
                <div class="card-badge">\${emoji}</div>
                <div class="card-actions">
                  <button class="btn btn-ghost btn-sm btn-icon btn-edit" data-id="\${c.id}" title="Edit course">
                    <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                  <button class="btn btn-danger btn-sm btn-icon btn-delete" data-id="\${c.id}" title="Delete course">
                    <svg width="14" height="14" fill="none" viewBox="0 0 24 24"><path d="M3 6h18M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6M10 11v6M14 11v6M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  </button>
                </div>
              </div>
              <div class="card-title">\${escHtml(c.title)}</div>
              <div class="card-instructor">
                <svg width="12" height="12" fill="none" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                \${escHtml(c.instructor || 'Unknown Instructor')}
              </div>
              <div class="card-description">\${c.description ? escHtml(c.description) : '<em style="color:var(--text-muted)">No description provided.</em>'}</div>
              <div class="card-footer">
                <div class="card-duration">
                  <svg width="12" height="12" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="2"/><path d="M12 6v6l4 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                  \${escHtml(String(dur))}
                </div>
                <span style="font-size:0.7rem;color:var(--text-muted);font-family:'Space Grotesk',sans-serif;letter-spacing:0.04em">ID #\${c.id}</span>
              </div>
            </div>\`;
        }).join('');
      }

      function escHtml(str) {
        const d = document.createElement('div');
        d.textContent = str;
        return d.innerHTML;
      }

      // ── Filter ─────────────────────────────────────────────────────────────
      function applyFilter() {
        const q = searchInput.value.toLowerCase().trim();
        if (!q) { renderCourses(courses); return; }
        renderCourses(courses.filter(c =>
          (c.title || '').toLowerCase().includes(q) ||
          (c.instructor || '').toLowerCase().includes(q) ||
          (c.description || '').toLowerCase().includes(q)
        ));
      }

      searchInput.addEventListener('input', applyFilter);

      // ── Fetch courses ──────────────────────────────────────────────────────
      async function fetchCourses() {
        showSkeletons();
        hideError();
        try {
          const res = await fetch(API);
          if (!res.ok) throw new Error(\`Server responded with \${res.status}\`);
          courses = await res.json();
          applyFilter();
          updateStats();
        } catch (err) {
          grid.innerHTML = \`<div class="state-panel">
            <span class="icon">&#128268;</span>
            <p>Unable to load courses.</p>
            <p class="hint">Make sure the API server is running at <code style="color:var(--accent2)">\${API}</code></p>
          </div>\`;
          showError(\`API unreachable: \${err.message}. Displaying cached or empty data.\`);
          courses = [];
          updateStats();
        }
      }

      // ── Create / Update ────────────────────────────────────────────────────
      function validateForm() {
        let ok = true;
        const titleField = document.getElementById('field-title');
        const instrField = document.getElementById('field-instructor');
        titleField.classList.remove('invalid');
        instrField.classList.remove('invalid');
        if (!inputTitle.value.trim()) { titleField.classList.add('invalid'); ok = false; }
        if (!inputInstr.value.trim()) { instrField.classList.add('invalid'); ok = false; }
        return ok;
      }

      courseForm.addEventListener('submit', async e => {
        e.preventDefault();
        if (!validateForm()) return;

        const payload = {
          title:       inputTitle.value.trim(),
          instructor:  inputInstr.value.trim(),
          description: inputDesc.value.trim(),
          duration:    inputDur.value.trim(),
        };

        const btn = document.getElementById('form-submit');
        btn.disabled = true;
        btn.style.opacity = '0.7';

        try {
          let res, data;
          if (editingId !== null) {
            res  = await fetch(\`\${API}/\${editingId}\`, {
              method: 'PUT',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            if (!res.ok) throw new Error(\`Server error \${res.status}\`);
            data = await res.json();
            const idx = courses.findIndex(c => c.id === editingId);
            if (idx !== -1) courses[idx] = data;
            toast('Course updated successfully!', 'success');
          } else {
            res  = await fetch(API, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            if (!res.ok) throw new Error(\`Server error \${res.status}\`);
            data = await res.json();
            courses.unshift(data);
            toast('Course added successfully!', 'success');
          }
          closeModal(formModal);
          applyFilter();
          updateStats();
        } catch (err) {
          toast(\`Failed: \${err.message}\`, 'error');
        } finally {
          btn.disabled = false;
          btn.style.opacity = '';
        }
      });

      // ── Open form for new ──────────────────────────────────────────────────
      function openAddForm() {
        editingId = null;
        formTitle.textContent = 'Add New Course';
        formSubmitLbl.textContent = 'Add Course';
        document.getElementById('form-submit').querySelector('svg').style.display = '';
        courseForm.reset();
        ['field-title','field-instructor'].forEach(id => document.getElementById(id).classList.remove('invalid'));
        openModal(formModal);
        inputTitle.focus();
      }

      // ── Open form for edit ─────────────────────────────────────────────────
      function openEditForm(id) {
        const c = courses.find(x => x.id === id);
        if (!c) return;
        editingId = id;
        formTitle.textContent = 'Edit Course';
        formSubmitLbl.textContent = 'Save Changes';
        document.getElementById('form-submit').querySelector('svg').style.display = 'none';
        inputTitle.value = c.title || '';
        inputInstr.value = c.instructor || '';
        inputDesc.value  = c.description || '';
        inputDur.value   = c.duration || '';
        ['field-title','field-instructor'].forEach(id => document.getElementById(id).classList.remove('invalid'));
        openModal(formModal);
        inputTitle.focus();
      }

      // ── Delete ─────────────────────────────────────────────────────────────
      function promptDelete(id) {
        const c = courses.find(x => x.id === id);
        pendingDeleteId = id;
        deleteCourseName.textContent = \`"\${c ? c.title : 'this course'}"\`;
        openModal(deleteModal);
      }

      document.getElementById('delete-confirm').addEventListener('click', async () => {
        if (pendingDeleteId === null) return;
        const btn = document.getElementById('delete-confirm');
        btn.disabled = true;
        btn.textContent = 'Deleting…';
        try {
          const res = await fetch(\`\${API}/\${pendingDeleteId}\`, { method: 'DELETE' });
          if (!res.ok) throw new Error(\`Server error \${res.status}\`);
          courses = courses.filter(c => c.id !== pendingDeleteId);
          closeModal(deleteModal);
          applyFilter();
          updateStats();
          toast('Course deleted.', 'info');
        } catch (err) {
          toast(\`Delete failed: \${err.message}\`, 'error');
        } finally {
          btn.disabled = false;
          btn.textContent = 'Delete Course';
          pendingDeleteId = null;
        }
      });

      // ── Event delegation for card buttons ─────────────────────────────────
      grid.addEventListener('click', e => {
        const editBtn   = e.target.closest('.btn-edit');
        const deleteBtn = e.target.closest('.btn-delete');
        if (editBtn)   openEditForm(Number(editBtn.dataset.id));
        if (deleteBtn) promptDelete(Number(deleteBtn.dataset.id));
      });

      // ── Wire up buttons ────────────────────────────────────────────────────
      document.getElementById('btn-add-course').addEventListener('click', openAddForm);
      document.getElementById('btn-refresh').addEventListener('click', fetchCourses);
      document.getElementById('form-modal-close').addEventListener('click', () => closeModal(formModal));
      document.getElementById('form-cancel').addEventListener('click', () => closeModal(formModal));
      document.getElementById('delete-cancel').addEventListener('click', () => closeModal(deleteModal));

      // ── Init ───────────────────────────────────────────────────────────────
      fetchCourses();
    </script>
  </body>
</html>
